<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Miniature Inventory</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 30px;
      background: #f5f5f5;
    }

    h1 {
      margin-bottom: 10px;
    }

    .controls {
      margin-bottom: 20px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    input, select {
      padding: 8px;
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }

    .unit {
      font-size: 18px;
      font-weight: bold;
    }

    .meta {
      color: #555;
      margin: 6px 0;
    }

    .qty {
      margin-top: 10px;
      font-size: 14px;

      
    }

    .notes {
  margin-top: 10px;
  font-size: 13px;
  color: #127227;
  font-style: italic;
}
  </style>
</head>
<body>

  <h1>Miniature Inventory</h1>

  <div class="controls">
    <input id="searchBox" type="text" placeholder="Search units..." />

    <select id="franchiseFilter">
      <option value="">All Franchises</option>
    </select>

    <select id="factionFilter">
      <option value="">All Factions</option>
    </select>
  </div>

  <div id="inventory" class="grid"></div>

  <script>
    const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT2Nv6Pddb1DlpDMqNYAppOR346atlG1qEwCeI1rTxgh4VO9B6HGzAxptvwFePDeV5MSpAJea-qvQcG/pub?gid=0&single=true&output=csv";

    let inventory = [];

    async function loadInventory() {
      const response = await fetch(csvUrl);
      const text = await response.text();

      const rows = text.trim().split("\n").map(row =>
        row.split(",").map(cell => cell.trim())
      );

      const headers = rows.shift();

      inventory = rows.map(row => {
        let item = {};
        headers.forEach((header, index) => {
          item[header] = row[index] || "";
        });
        return item;
      });

      populateFilters();
      renderInventory();
    }

    function populateFilters() {
      const franchises = [...new Set(inventory.map(i => i.Franchise))].sort();
      const factions = [...new Set(inventory.map(i => i.Faction))].sort();

      const franchiseFilter = document.getElementById("franchiseFilter");
      const factionFilter = document.getElementById("factionFilter");

      franchises.forEach(franchise => {
        const option = document.createElement("option");
        option.value = franchise;
        option.textContent = franchise;
        franchiseFilter.appendChild(option);
      });

      factions.forEach(faction => {
        const option = document.createElement("option");
        option.value = faction;
        option.textContent = faction;
        factionFilter.appendChild(option);
      });
    }

    function renderInventory() {
      const search = document.getElementById("searchBox").value.toLowerCase();
      const franchise = document.getElementById("franchiseFilter").value;
      const faction = document.getElementById("factionFilter").value;

      const container = document.getElementById("inventory");
      container.innerHTML = "";

      const filtered = inventory.filter(item => {
        return (
          (!search || item.Unit.toLowerCase().includes(search)) &&
          (!franchise || item.Franchise === franchise) &&
          (!faction || item.Faction === faction)
        );
      });

      filtered.forEach(item => {
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
          <div class="unit">${item.Unit}</div>
          <div class="meta">${item.Franchise} / ${item.Faction}</div>
          <div class="meta">${item.Variant || ""}</div>
          <div class="qty">
            Total: ${item["Total Qty"] || 0}<br>
            Built: ${item["Built Qty"] || 0}<br>
            Painted: ${item["Painted Qty"] || 0}
          </div>

          </div class="meta">
            ${item.Notes || ""}
          </div>
        `;

        container.appendChild(card);
      });
    }

    document.getElementById("searchBox").addEventListener("input", renderInventory);
    document.getElementById("franchiseFilter").addEventListener("change", renderInventory);
    document.getElementById("factionFilter").addEventListener("change", renderInventory);

    loadInventory();
  </script>

</body>
</html>
